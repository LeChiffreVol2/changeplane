name: ChangePlane Guard
description: Run the revision-bound assurance harness in observe or autonomous mode.
inputs:
  token:
    description: GitHub token used to read pull requests, deployments, and reviewer permissions.
    required: true
  mode:
    description: Observe publishes a neutral receipt. Enforce enables the bounded repair controller.
    required: false
    default: observe
  agent_dispatch:
    description: Repair dispatch boundary. Must remain none unless the trusted harness selects webhook.
    required: false
    default: none
  agent_webhook_url:
    description: Trusted ChangePlane controller endpoint.
    required: false
  agent_webhook_token:
    description: Repository-bound controller authentication secret.
    required: false
  controller_installation_id:
    description: Exact GitHub App installation allowed to authorize this repository.
    required: false
  max_remediation_attempts:
    description: Bounded autonomous repair attempts.
    required: false
    default: "2"
  policy_path:
    description: Policy file read from the trusted default-branch base revision.
    required: false
    default: .changeplane.json
outputs:
  mode:
    description: Active harness mode.
  decision:
    description: Exact-head harness result.
  receipt:
    description: Canonical one-line JSON receipt bound to the exact revision and policy digest.
  actual_files:
    description: Number of changed files evaluated.
  finding_count:
    description: Number of scope or protected-path findings.
  agent_handback:
    description: Canonical proposal-only handback JSON bound to the exact pull-request revision, when fixable findings exist.
runs:
  using: node24
  main: action/index.js
