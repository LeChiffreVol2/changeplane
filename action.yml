name: ChangePlane Guard — observe pilot
description: Bind exact pull request revision and publish a neutral scope and policy receipt. Observe only; no enforcement or repair.
inputs:
  token:
    description: GitHub token used to read pull requests, deployments, and reviewer permissions.
    required: true
  policy_path:
    description: Policy file read from the pull request base SHA.
    required: false
    default: .changeplane.json
outputs:
  mode:
    description: Always observe in this pilot.
  decision:
    description: Evaluator result shown in the receipt. PASS is not approval and the Check remains neutral and non-blocking.
  receipt:
    description: Canonical one-line JSON receipt bound to the exact revision and policy digest.
  actual_files:
    description: Number of changed files evaluated.
  finding_count:
    description: Number of scope or protected-path findings.
runs:
  using: node24
  main: action/index.js
