# Managed autonomous harness. Only a server-owned ChangePlane App may sign and
# dispatch a repair grant; repository secrets remain inert in observe mode.
name: ChangePlane repair harness

on:
  repository_dispatch:
    types: [changeplane_repair]

concurrency:
  group: changeplane-repair-${{ github.event.client_payload.entry.pullRequestNumber || github.run_id }}
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      grant-digest: ${{ steps.grant.outputs.grant-digest }}
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Use the pinned Node.js runtime
        # actions/setup-node v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.18.0

      - name: Refuse repair while the repository kill switch is off
        env:
          CHANGEPLANE_REPAIR_ENABLED: ${{ secrets.CHANGEPLANE_REPAIR_ENABLED }}
        run: test "$CHANGEPLANE_REPAIR_ENABLED" = "true"

      - name: Check out the trusted default-branch harness
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.sha }}
          path: controller
          persist-credentials: false

      - name: Verify the App-signed repair grant
        id: grant
        env:
          CHANGEPLANE_BASE_REF: ${{ github.event.repository.default_branch }}
          CHANGEPLANE_CONTROLLER_SHA: ${{ github.sha }}
          CHANGEPLANE_PUBLISHER_RELEASE_SHA: ${{ github.event.client_payload.entry.publisherReleaseSha }}
          CHANGEPLANE_REPAIR_ENABLED: ${{ secrets.CHANGEPLANE_REPAIR_ENABLED }}
          CHANGEPLANE_REPAIR_GENERATION: ${{ secrets.CHANGEPLANE_REPAIR_GENERATION }}
          CHANGEPLANE_REPAIR_PUBLIC_KEYS: ${{ secrets.CHANGEPLANE_REPAIR_PUBLIC_KEYS }}
        run: node controller/changeplane/examples/changeplane-grant.js verify

      - name: Bind the live pull request and reserve the grant once
        # actions/github-script v7.0.1
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          CHANGEPLANE_BASE_SHA: ${{ steps.grant.outputs.base-sha }}
          CHANGEPLANE_BASE_REF: ${{ steps.grant.outputs.base-ref }}
          CHANGEPLANE_CLAIM: ${{ steps.grant.outputs.claim-name }}
          CHANGEPLANE_HEAD_REF: ${{ steps.grant.outputs.head-ref }}
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
          CHANGEPLANE_PULL_REQUEST: ${{ steps.grant.outputs.pull-request-number }}
          CHANGEPLANE_REPOSITORY: ${{ steps.grant.outputs.repository }}
        with:
          script: |
            const pullNumber = Number(process.env.CHANGEPLANE_PULL_REQUEST);
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });
            if (pull.state !== 'open' || pull.base.ref !== process.env.CHANGEPLANE_BASE_REF
              || pull.base.sha !== process.env.CHANGEPLANE_BASE_SHA
              || pull.head.sha !== process.env.CHANGEPLANE_HEAD_SHA
              || pull.head.ref !== process.env.CHANGEPLANE_HEAD_REF
              || pull.head.repo?.full_name !== process.env.CHANGEPLANE_REPOSITORY) {
              core.setFailed('The pull-request revision no longer matches this signed repair grant.');
              return;
            }
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: process.env.CHANGEPLANE_CLAIM,
              per_page: 2,
            });
            if (artifacts.total_count !== 0) {
              core.setFailed('This one-time repair grant was already claimed.');
            }

      - name: Claim the App-authored grant before provider access
        id: controller-claim
        env:
          CHANGEPLANE_CLAIM_URL: "https://changeplane.vercel.app/api/github?action=repair-claim"
          CHANGEPLANE_CONTROLLER_HMAC: ${{ secrets.CHANGEPLANE_CONTROLLER_HMAC }}
        run: node controller/changeplane/examples/changeplane-claim.js claim

      - name: Materialize the one-time claim
        env:
          CHANGEPLANE_CLAIM: ${{ steps.grant.outputs.claim-name }}
        run: >-
          node -e 'require("node:fs").writeFileSync(process.env.RUNNER_TEMP + "/changeplane-claim", process.env.CHANGEPLANE_CLAIM + "\n", {mode: 0o600})'

      # actions/upload-artifact v4.6.2
      - name: Reserve the one-time claim before provider access
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.grant.outputs.claim-name }}
          path: ${{ runner.temp }}/changeplane-claim
          if-no-files-found: error
          retention-days: 1

      - name: Check out the trusted controller from the bound base revision
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ steps.grant.outputs.base-sha }}
          path: trusted
          persist-credentials: false

      - name: Check out the untrusted candidate workspace
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ steps.grant.outputs.head-sha }}
          path: workspace
          fetch-depth: 0
          persist-credentials: false

      - name: Bind the trusted merge base
        id: baseline
        working-directory: workspace
        env:
          CHANGEPLANE_BASE_SHA: ${{ steps.grant.outputs.base-sha }}
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
        run: |
          node -e '
            const {execFileSync} = require("node:child_process");
            const {appendFileSync} = require("node:fs");
            const mergeBase = execFileSync("/usr/bin/git", ["merge-base", process.env.CHANGEPLANE_BASE_SHA, process.env.CHANGEPLANE_HEAD_SHA]).toString().trim();
            appendFileSync(process.env.GITHUB_OUTPUT, "merge-base=" + mergeBase + "\n");
          '

      - name: Build a deterministic scope-restoration patch
        if: steps.grant.outputs.repair-kind == 'scope'
        working-directory: workspace
        env:
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
          CHANGEPLANE_MERGE_BASE: ${{ steps.baseline.outputs.merge-base }}
          CHANGEPLANE_PATCH: ${{ runner.temp }}/changeplane.patch
        run: |
          node -e '
            const {execFileSync} = require("node:child_process");
            const {readFileSync, writeFileSync} = require("node:fs");
            const request = JSON.parse(readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")).client_payload.entry;
            const driftPaths = request.instructions.map(item => item.path);
            const patch = execFileSync("/usr/bin/git", ["diff", "--no-ext-diff", "--no-textconv", "--binary", "--full-index", "--no-renames", process.env.CHANGEPLANE_HEAD_SHA, process.env.CHANGEPLANE_MERGE_BASE, "--", ...driftPaths], {maxBuffer: 262144});
            if (!patch.length) throw new Error("Scope restoration produced no patch");
            writeFileSync(process.env.CHANGEPLANE_PATCH, patch, {mode: 0o600});
          '

      - name: Revalidate server authority immediately before provider access
        if: steps.grant.outputs.repair-kind == 'evidence'
        env:
          CHANGEPLANE_CLAIM_URL: "https://changeplane.vercel.app/api/github?action=repair-validate"
          CHANGEPLANE_CONTROLLER_HMAC: ${{ secrets.CHANGEPLANE_CONTROLLER_HMAC }}
        run: node controller/changeplane/examples/changeplane-claim.js validate

      - name: Re-check the exact pull-request head immediately before OpenAI
        if: steps.grant.outputs.repair-kind == 'evidence'
        # actions/github-script v7.0.1
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          CHANGEPLANE_BASE_SHA: ${{ steps.grant.outputs.base-sha }}
          CHANGEPLANE_BASE_REF: ${{ steps.grant.outputs.base-ref }}
          CHANGEPLANE_HEAD_REF: ${{ steps.grant.outputs.head-ref }}
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
          CHANGEPLANE_PULL_REQUEST: ${{ steps.grant.outputs.pull-request-number }}
          CHANGEPLANE_REPOSITORY: ${{ steps.grant.outputs.repository }}
        with:
          script: |
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.CHANGEPLANE_PULL_REQUEST),
            });
            if (pull.state !== 'open' || pull.base.ref !== process.env.CHANGEPLANE_BASE_REF
              || pull.base.sha !== process.env.CHANGEPLANE_BASE_SHA
              || pull.head.sha !== process.env.CHANGEPLANE_HEAD_SHA
              || pull.head.ref !== process.env.CHANGEPLANE_HEAD_REF
              || pull.head.repo?.full_name !== process.env.CHANGEPLANE_REPOSITORY) {
              core.setFailed('The pull-request head changed immediately before provider access.');
            }

      - name: Ask GPT-5.6 for a bounded patch proposal
        if: steps.grant.outputs.repair-kind == 'evidence'
        working-directory: workspace
        env:
          CHANGEPLANE_PATCH: ${{ runner.temp }}/changeplane.patch
          CHANGEPLANE_TRUSTED_POLICY: ${{ github.workspace }}/trusted/.changeplane.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node ../controller/changeplane/examples/changeplane-proposal.js propose

      - name: Validate and package the candidate patch
        working-directory: workspace
        env:
          CHANGEPLANE_ALLOWED: ${{ toJson(github.event.client_payload.entry.allowedPaths) }}
          CHANGEPLANE_REPAIR_KIND: ${{ steps.grant.outputs.repair-kind }}
          CHANGEPLANE_PATCH: ${{ runner.temp }}/changeplane.patch
          BASH_ENV: /dev/null
          GIT_CONFIG_COUNT: "0"
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null
          GIT_NO_REPLACE_OBJECTS: "1"
          LD_PRELOAD: ""
          NODE_OPTIONS: ""
        run: |
          if [ "$CHANGEPLANE_REPAIR_KIND" = "evidence" ]; then
            node ../controller/changeplane/examples/changeplane-proposal.js validate
          fi
          /usr/bin/git apply --check --recount --whitespace=error "$CHANGEPLANE_PATCH"

      # actions/upload-artifact v4.6.2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: changeplane-patch-${{ steps.grant.outputs.authorization-id }}
          path: ${{ runner.temp }}/changeplane.patch
          if-no-files-found: error
          retention-days: 1

  apply:
    needs: repair
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Use the pinned Node.js runtime
        # actions/setup-node v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.18.0

      - name: Refuse apply while the repository kill switch is off
        env:
          CHANGEPLANE_REPAIR_ENABLED: ${{ secrets.CHANGEPLANE_REPAIR_ENABLED }}
        run: test "$CHANGEPLANE_REPAIR_ENABLED" = "true"

      - name: Check out the trusted default-branch harness
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.sha }}
          path: controller
          persist-credentials: false

      - name: Re-verify the signed grant, global deadline, and kill-switch generation
        id: grant
        env:
          CHANGEPLANE_BASE_REF: ${{ github.event.repository.default_branch }}
          CHANGEPLANE_CONTROLLER_SHA: ${{ github.sha }}
          CHANGEPLANE_PUBLISHER_RELEASE_SHA: ${{ github.event.client_payload.entry.publisherReleaseSha }}
          CHANGEPLANE_EXPECTED_GRANT_DIGEST: ${{ needs.repair.outputs.grant-digest }}
          CHANGEPLANE_REPAIR_ENABLED: ${{ secrets.CHANGEPLANE_REPAIR_ENABLED }}
          CHANGEPLANE_REPAIR_GENERATION: ${{ secrets.CHANGEPLANE_REPAIR_GENERATION }}
          CHANGEPLANE_REPAIR_PUBLIC_KEYS: ${{ secrets.CHANGEPLANE_REPAIR_PUBLIC_KEYS }}
        run: node controller/changeplane/examples/changeplane-grant.js verify

      - name: Re-check the exact pull-request head before clean apply
        id: current
        # actions/github-script v7.0.1
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          CHANGEPLANE_BASE_SHA: ${{ steps.grant.outputs.base-sha }}
          CHANGEPLANE_BASE_REF: ${{ steps.grant.outputs.base-ref }}
          CHANGEPLANE_HEAD_REF: ${{ steps.grant.outputs.head-ref }}
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
          CHANGEPLANE_PULL_REQUEST: ${{ steps.grant.outputs.pull-request-number }}
          CHANGEPLANE_REPOSITORY: ${{ steps.grant.outputs.repository }}
        with:
          script: |
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.CHANGEPLANE_PULL_REQUEST),
            });
            if (pull.state !== 'open' || pull.base.ref !== process.env.CHANGEPLANE_BASE_REF
              || pull.base.sha !== process.env.CHANGEPLANE_BASE_SHA
              || pull.head.sha !== process.env.CHANGEPLANE_HEAD_SHA
              || pull.head.ref !== process.env.CHANGEPLANE_HEAD_REF
              || pull.head.repo?.full_name !== process.env.CHANGEPLANE_REPOSITORY) {
              core.setFailed('The pull-request head changed; refusing to apply a stale patch.');
              return;
            }
            core.setOutput('head-ref', pull.head.ref);

      - name: Check out the trusted controller from the bound base revision
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ steps.grant.outputs.base-sha }}
          path: trusted
          persist-credentials: false

      - name: Check out the exact candidate head for the clean apply
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ steps.grant.outputs.head-sha }}
          path: workspace
          fetch-depth: 0
          persist-credentials: false

      # actions/download-artifact v4.3.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: changeplane-patch-${{ steps.grant.outputs.authorization-id }}
          path: ${{ runner.temp }}

      - name: Revalidate server authority immediately before clean apply
        env:
          CHANGEPLANE_CLAIM_URL: "https://changeplane.vercel.app/api/github?action=repair-validate"
          CHANGEPLANE_CONTROLLER_HMAC: ${{ secrets.CHANGEPLANE_CONTROLLER_HMAC }}
        run: node controller/changeplane/examples/changeplane-claim.js validate

      - name: Apply and independently validate only the granted paths
        working-directory: workspace
        env:
          CHANGEPLANE_ALLOWED: ${{ toJson(github.event.client_payload.entry.allowedPaths) }}
          CHANGEPLANE_BASE_REF: ${{ github.event.repository.default_branch }}
          CHANGEPLANE_BASE_SHA: ${{ steps.grant.outputs.base-sha }}
          CHANGEPLANE_CLAIM_URL: "https://changeplane.vercel.app/api/github?action=repair-validate"
          CHANGEPLANE_CONTROLLER_SHA: ${{ github.sha }}
          CHANGEPLANE_CONTROLLER_HMAC: ${{ secrets.CHANGEPLANE_CONTROLLER_HMAC }}
          CHANGEPLANE_EXPECTED_GRANT_DIGEST: ${{ needs.repair.outputs.grant-digest }}
          CHANGEPLANE_HEAD_REF: ${{ steps.current.outputs.head-ref }}
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
          CHANGEPLANE_INSTRUCTIONS: ${{ toJson(github.event.client_payload.entry.instructions) }}
          CHANGEPLANE_PATCH: ${{ runner.temp }}/changeplane.patch
          CHANGEPLANE_REPAIR_KIND: ${{ steps.grant.outputs.repair-kind }}
          CHANGEPLANE_REPAIR_ENABLED: ${{ secrets.CHANGEPLANE_REPAIR_ENABLED }}
          CHANGEPLANE_REPAIR_GENERATION: ${{ secrets.CHANGEPLANE_REPAIR_GENERATION }}
          CHANGEPLANE_REPAIR_PUBLIC_KEYS: ${{ secrets.CHANGEPLANE_REPAIR_PUBLIC_KEYS }}
          CHANGEPLANE_PUBLISHER_RELEASE_SHA: ${{ github.event.client_payload.entry.publisherReleaseSha }}
        run: |
          if [ "$CHANGEPLANE_REPAIR_KIND" = "evidence" ]; then
            node ../controller/changeplane/examples/changeplane-proposal.js validate
          fi
          /usr/bin/git apply --check --index --recount --whitespace=error "$CHANGEPLANE_PATCH"
          /usr/bin/git apply --index --recount --whitespace=error "$CHANGEPLANE_PATCH"
          node -e '
            const {execFileSync} = require("node:child_process");
            const allowedPaths = JSON.parse(process.env.CHANGEPLANE_ALLOWED);
            const matches = (path, rule) => rule.endsWith("/**")
              ? path === rule.slice(0, -3) || path.startsWith(rule.slice(0, -3) + "/")
              : path === rule;
            const currentHead = execFileSync("/usr/bin/git", ["rev-parse", "HEAD"]).toString().trim();
            if (currentHead !== process.env.CHANGEPLANE_HEAD_SHA) throw new Error("Checked-out head changed before clean validation");
            const mergeBase = execFileSync("/usr/bin/git", ["merge-base", process.env.CHANGEPLANE_BASE_SHA, process.env.CHANGEPLANE_HEAD_SHA]).toString().trim();
            const changed = execFileSync("/usr/bin/git", ["diff", "--cached", "--no-renames", "--name-only", "-z"]).toString().split("\0").filter(Boolean);
            const unexpected = changed.filter(path => !allowedPaths.some(rule => matches(path, rule)));
            if (!changed.length || unexpected.length) throw new Error("Unsafe patch paths: " + (unexpected.join(", ") || "none"));
            if (process.env.CHANGEPLANE_REPAIR_KIND === "scope") {
              const driftPaths = JSON.parse(process.env.CHANGEPLANE_INSTRUCTIONS).map(item => item.path);
              const remaining = execFileSync("/usr/bin/git", ["diff", "--cached", "--no-ext-diff", "--no-textconv", "--no-renames", "--name-only", "-z", mergeBase, "--", ...driftPaths]).toString().split("\0").filter(Boolean);
              if (remaining.length) throw new Error("Clean apply did not restore granted paths to the trusted merge base: " + remaining.join(", "));
            }
          '
          /usr/bin/git config user.name "changeplane[bot]"
          /usr/bin/git config user.email "changeplane[bot]@users.noreply.github.com"
          /usr/bin/git -c core.hooksPath=/dev/null commit -m "chore: apply bounded ChangePlane repair"
          node ../controller/changeplane/examples/changeplane-grant.js verify
          node ../controller/changeplane/examples/changeplane-claim.js validate

      - name: Reserve one short-lived App push credential
        id: push-token
        env:
          CHANGEPLANE_CLAIM_URL: "https://changeplane.vercel.app/api/github?action=repair-push-token"
          CHANGEPLANE_CONTROLLER_HMAC: ${{ secrets.CHANGEPLANE_CONTROLLER_HMAC }}
        run: node controller/changeplane/examples/changeplane-claim.js push-token

      # GITHUB_TOKEN pushes do not start fresh workflow runs. This Contents-only App token
      # lets GitHub emit pull_request synchronize for the repaired head, starting fresh CI
      # and the exact-head ChangePlane guard without granting the worker merge or Check authority.
      - name: Push with the one-time App credential and trigger fresh exact-head CI
        id: push
        working-directory: workspace
        env:
          CHANGEPLANE_ASKPASS: ${{ runner.temp }}/changeplane-git-askpass
          CHANGEPLANE_HEAD_REF: ${{ steps.current.outputs.head-ref }}
          CHANGEPLANE_HEAD_SHA: ${{ steps.grant.outputs.head-sha }}
          CHANGEPLANE_PUSH_TOKEN_FILE: ${{ steps.push-token.outputs.token-file }}
          GIT_ASKPASS: ${{ runner.temp }}/changeplane-git-askpass
          GIT_TERMINAL_PROMPT: "0"
        run: |
          cleanup() {
            /usr/bin/rm -f -- "$CHANGEPLANE_PUSH_TOKEN_FILE" "$CHANGEPLANE_ASKPASS"
          }
          trap cleanup EXIT INT TERM
          test -f "$CHANGEPLANE_PUSH_TOKEN_FILE"
          test "$(/usr/bin/stat -c '%a' "$CHANGEPLANE_PUSH_TOKEN_FILE")" = "600"
          node -e '
            const {writeFileSync} = require("node:fs");
            writeFileSync(process.env.CHANGEPLANE_ASKPASS, `#!/bin/sh
          case "$1" in
            *Username*) printf "%s\\n" "x-access-token" ;;
            *Password*) /bin/cat "$CHANGEPLANE_PUSH_TOKEN_FILE" ;;
            *) exit 1 ;;
          esac
          `, {mode: 0o700});
          '
          /usr/bin/git config --local --unset-all http.https://github.com/.extraheader || true
          /usr/bin/git -c core.hooksPath=/dev/null -c credential.helper= push \
            --force-with-lease="refs/heads/$CHANGEPLANE_HEAD_REF:$CHANGEPLANE_HEAD_SHA" \
            origin "HEAD:refs/heads/$CHANGEPLANE_HEAD_REF"
          echo "new-head=$(/usr/bin/git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Remove the short-lived App push credential
        if: always()
        env:
          CHANGEPLANE_ASKPASS: ${{ runner.temp }}/changeplane-git-askpass
          CHANGEPLANE_PUSH_TOKEN_FILE: ${{ runner.temp }}/changeplane-push-token
        run: /usr/bin/rm -f -- "$CHANGEPLANE_PUSH_TOKEN_FILE" "$CHANGEPLANE_ASKPASS"
